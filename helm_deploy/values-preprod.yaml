---
# Per environment values which override defaults in hmpps-digital-canteen-api/values.yaml

generic-service:
  replicaCount: 1

  ingress:
    host: digital-canteen-preprod.prison.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.preprod.json"
    API_HMPPS_AUTH_BASE_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    API_HEALTH_AND_MEDICATION_BASE_URL: "https://health-and-medication-api-preprod.hmpps.service.justice.gov.uk"
    API_PRISONER_SEARCH_BASE_URL: "https://prisoner-search-preprod.prison.service.justice.gov.uk"
    API_PRISONER_ADJUDICATIONS_BASE_URL: "https://manage-adjudications-api-preprod.hmpps.service.justice.gov.uk"
    API_PRISONER_INCENTIVES_BASE_URL: "https://incentives-api-preprod.hmpps.service.justice.gov.uk"
    API_OPEN_FOOD_FACTS_BASE_URL: "https://world.openfoodfacts.org"
    API_OPEN_PRODUCTS_FACTS_BASE_URL: "https://world.openproductsfacts.org"
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: n/a