---
# Per environment values which override defaults in hmpps-digital-canteen-api/values.yaml

generic-service:
  replicaCount: 1

  ingress:
    host: digital-canteen.prison.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.json"
    API_HMPPS_AUTH_BASE_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    API_HEALTH_AND_MEDICATION_BASE_URL: "https://health-and-medication-api.hmpps.service.justice.gov.uk"
    API_PRISONER_SEARCH_BASE_URL: "https://prisoner-search.prison.service.justice.gov.uk"
    API_PRISONER_ADJUDICATIONS_BASE_URL: "https://manage-adjudications-api.hmpps.service.justice.gov.uk"
    API_PRISONER_INCENTIVES_BASE_URL: "https://incentives-api.hmpps.service.justice.gov.uk"
    API_OPEN_FOOD_FACTS_BASE_URL: "https://world.openfoodfacts.org"
    API_OPEN_PRODUCTS_FACTS_BASE_URL: "https://world.openproductsfacts.org"
    API_PRISON_API_BASE_URL: "https://prison-api.prison.service.justice.gov.uk"
    SPRINGDOC_API-DOCS_ENABLED: "true"
    SPRINGDOC_SWAGGER-UI_ENABLED: "true"
    API_MEDUSA_BASE_URL: "https://digital-canteen-medusa.prison.service.justice.gov.uk"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: n/a