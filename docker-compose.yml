services:
  hmpps-digital-canteen-api:
    image: ghcr.io/ministryofjustice/hmpps-digital-canteen-api:latest
    networks:
      - hmpps
    container_name: hmpps-digital-canteen-api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      - SPRING_PROFILES_ACTIVE=dev

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0

  hmpps-digital-canteen-api-db:
    image: postgres:17
    networks:
      - hmpps
    container_name: hmpps-digital-canteen-api-db
    restart: unless-stopped
    ports:
      - "9432:5432"
    environment:
      - POSTGRES_PASSWORD=hmpps-digital-canteen-data
      - POSTGRES_USER=hmpps-digital-canteen-data
      - POSTGRES_DB=hmpps-digital-canteen-data
      - TZ="Europe/London"

networks:
  hmpps:
