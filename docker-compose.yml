version: '3.8'

services:
  brms:
    image: gorules/editor:1.16.1
    ports:
      - '9080:80'
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gorules
      DB_PASSWORD: your-secure-password
      DB_NAME: gorules
      DB_SSL_DISABLED: true
      LICENSE_KEY: your-license-key

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gorules
      POSTGRES_PASSWORD: your-secure-password
      POSTGRES_DB: gorules
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  postgres_data: